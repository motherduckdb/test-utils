#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
    paths-ignore:
      - '**.tar.gz'
      - 'extensions/**'
    branches:
      - "main"
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  duckdb-next-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    if: false   # extension-template is currently not compatible with main
    with:
      duckdb_version: main
      ci_tools_version: main
      extension_name: test_utils

  duckdb-stable-110:
    name: Build extension binaries (v1.1.0)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.1.3
    with:
      duckdb_version: v1.1.0
      ci_tools_version: v1.1.3
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_rtools;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-111:
    name: Build extension binaries (v1.1.1)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.1.3
    with:
      duckdb_version: v1.1.1
      ci_tools_version: v1.1.3
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_rtools;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-112:
    name: Build extension binaries (v1.1.2)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.1.3
    with:
      duckdb_version: v1.1.2
      ci_tools_version: v1.1.3
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_rtools;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-113:
    name: Build extension binaries (v1.1.3)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.1.3
    with:
      duckdb_version: v1.1.3
      ci_tools_version: v1.1.3
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_rtools;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-120:
    name: Build extension binaries (v1.2.0)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.2.0
    with:
      duckdb_version: v1.2.0
      ci_tools_version: v1.2.0
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-121:
    name: Build extension binaries (v1.2.1)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.2.1
    with:
      duckdb_version: v1.2.1
      ci_tools_version: v1.2.1
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-122:
    name: Build extension binaries (v1.2.2)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.2.2
    with:
      duckdb_version: v1.2.2
      ci_tools_version: v1.2.2
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-130:
    name: Build extension binaries (v1.3.0)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.3.0
    with:
      duckdb_version: v1.3.0
      ci_tools_version: v1.3.0
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-131:
    name: Build extension binaries (v1.3.1)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.3.1
    with:
      duckdb_version: v1.3.1
      ci_tools_version: v1.3.1
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-132:
    name: Build extension binaries (v1.3.2)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.3.2
    with:
      duckdb_version: v1.3.2
      ci_tools_version: v1.3.2
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-140:
    name: Build extension binaries (v1.4.0)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.4.0
    with:
      duckdb_version: v1.4.0
      ci_tools_version: v1.4.0
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-141:
    name: Build extension binaries (v1.4.1)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.4.1
    with:
      duckdb_version: v1.4.1
      ci_tools_version: v1.4.1
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-142:
    name: Build extension binaries (v1.4.2)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.4.2
    with:
      duckdb_version: v1.4.2
      ci_tools_version: v1.4.2
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-143:
    name: Build extension binaries (v1.4.3)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.4.3
    with:
      duckdb_version: v1.4.3
      ci_tools_version: v1.4.3
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-stable-144:
    name: Build extension binaries (v1.4.4)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.4.4
    with:
      duckdb_version: v1.4.4
      ci_tools_version: v1.4.4
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  duckdb-main:
    name: Build extension binaries (main)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      duckdb_version: main
      ci_tools_version: main
      exclude_archs: 'linux_arm64;linux_amd64_musl;osx_amd64;windows_amd64;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads'
      extension_name: test_utils

  commit_extensions:
    name: Commit Extensions to Repository
    needs: [
      duckdb-stable-110, duckdb-stable-111, duckdb-stable-112, duckdb-stable-113,
      duckdb-stable-120, duckdb-stable-121, duckdb-stable-122,
      duckdb-stable-130, duckdb-stable-131, duckdb-stable-132,
      duckdb-stable-140, duckdb-stable-141, duckdb-stable-142, duckdb-stable-143, duckdb-stable-144,
      duckdb-main
    ]
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Organize extensions
        run: |
          set -euo pipefail
          rm -rf extensions
          mkdir -p extensions
          # Files are like: `test_utils-v1.3.0-extension-osx_arm64/test_utils.duckdb_extension`
          for FULL_EXT_PATH in $(find . -path ./extensions -prune -o -name test_utils.duckdb_extension -print); do
            echo "Processing: '${FULL_EXT_PATH}'"

            DIR_NAME=$(dirname "$FULL_EXT_PATH")
            DUCKDB_VERSION=$(echo $DIR_NAME | cut -d'-' -f2)
            EXT_ARCH=$(echo $DIR_NAME | cut -d'-' -f4)

            OUTPUT_DIR="extensions/${DUCKDB_VERSION}/${EXT_ARCH}"
            mkdir -p "$OUTPUT_DIR"

            gzip --keep -f "${FULL_EXT_PATH}"
            cp "${FULL_EXT_PATH}.gz" "${OUTPUT_DIR}/test_utils.duckdb_extension.gz"

            echo "Copied to '${OUTPUT_DIR}/test_utils.duckdb_extension.gz'"
          done

      - name: Commit and push extensions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extensions/
          git commit -m "Update extensions" || echo "No changes to commit"
          git push

  code-quality-check:
    name: Code Quality Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@main
    with:
      duckdb_version: v1.3.1
      ci_tools_version: main
      extension_name: test_utils
      format_checks: 'format;tidy'
